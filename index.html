<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WA FuelWatch">
<title>WA FuelWatch — Live Fuel Prices</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,600;0,9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%233d8bfd%22/><text y=%2270%22 x=%2250%22 text-anchor=%22middle%22 font-size=%2260%22>⛽</text></svg>">
<style>
:root {
  --bg: #0b0f14;
  --surface: #131920;
  --surface-2: #1a222c;
  --surface-3: #222d3a;
  --border: #2a3545;
  --border-active: #3d8bfd;
  --text: #e8ecf1;
  --text-muted: #8494a7;
  --text-dim: #5c6f85;
  --accent: #3d8bfd;
  --accent-glow: rgba(61,139,253,0.15);
  --accent-subtle: rgba(61,139,253,0.08);
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.12);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 18px;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'Space Mono', monospace;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
  --safe-top: env(safe-area-inset-top, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
  --tab-h: 60px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  overflow-x: hidden;
}
html { height: auto; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom));
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select { font-family: inherit; }

/* ── Header (sticky) ── */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(11,15,20,0.85);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  padding: calc(var(--safe-top) + 0.75rem) 1rem 0.75rem;
  border-bottom: 1px solid var(--border);
  transition: box-shadow 0.2s;
}
.header.scrolled { box-shadow: 0 2px 16px rgba(0,0,0,0.3); }
.header-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.logo {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-shrink: 0;
}
.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.logo h1 {
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.logo h1 span { color: var(--accent); }

.search-input-wrap {
  flex: 1;
  position: relative;
}
.search-input {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--text);
  font-size: 0.9rem;
  padding: 0.55rem 0.95rem 0.55rem 2.2rem;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.search-input:focus {
  border-color: var(--accent);
  background: var(--surface-3);
}
.search-icon {
  position: absolute;
  left: 0.7rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
}
.search-clear {
  position: absolute;
  right: 0.5rem;
  top: 50%;
  transform: translateY(-50%);
  width: 24px;
  height: 24px;
  background: var(--surface-3);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-muted);
}
.search-input-wrap.has-value .search-clear { display: flex; }

/* Autocomplete */
.autocomplete-list {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-height: 260px;
  overflow-y: auto;
  z-index: 100;
  display: none;
  box-shadow: var(--shadow-lg);
  -webkit-overflow-scrolling: touch;
}
.autocomplete-list.show { display: block; }
.autocomplete-list div {
  padding: 0.7rem 1rem;
  font-size: 0.9rem;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.autocomplete-list div:last-child { border-bottom: none; }
.autocomplete-list div:active,
.autocomplete-list div.active { background: var(--accent-subtle); color: var(--accent); }

/* Filter strip */
.filter-strip {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.65rem;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
  -webkit-overflow-scrolling: touch;
}
.filter-strip::-webkit-scrollbar { display: none; }
.fuel-pill {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 0.4rem 0.85rem;
  font-size: 0.78rem;
  font-weight: 500;
  white-space: nowrap;
  color: var(--text-muted);
  transition: all 0.2s;
  flex-shrink: 0;
}
.fuel-pill:active { transform: scale(0.95); }
.fuel-pill.selected {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── Container ── */
.container { max-width: 780px; margin: 0 auto; padding: 1rem; }

/* ── View System ── */
.view {
  display: none;
  animation: fadeIn 0.25s ease;
}
.view.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Section Header ── */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.85rem;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.section-head h2 {
  font-size: 0.95rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.badge {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 400;
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 0.15rem 0.5rem;
  border-radius: 100px;
  color: var(--text-muted);
}
.section-meta {
  font-size: 0.72rem;
  color: var(--text-dim);
}
.tomorrow-tag {
  background: var(--amber-bg);
  color: var(--amber);
  font-size: 0.7rem;
  font-weight: 600;
  padding: 0.2rem 0.6rem;
  border-radius: 100px;
}

/* Sort + Options Row */
.options-bar {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  flex-wrap: wrap;
}
.sort-select {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--text);
  padding: 0.35rem 0.7rem;
  font-size: 0.78rem;
  outline: none;
}
.toggle-chip {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 0.35rem 0.75rem;
  font-size: 0.75rem;
  color: var(--text-muted);
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  transition: all 0.2s;
}
.toggle-chip.on {
  background: var(--accent-subtle);
  border-color: var(--accent);
  color: var(--accent);
}
.toggle-chip:active { transform: scale(0.97); }

/* ── Result Card ── */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.9rem 1rem;
  margin-bottom: 0.5rem;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 0.75rem;
  transition: transform 0.15s, border-color 0.2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.result-card:active { transform: scale(0.98); }
.result-card.cheapest {
  border-color: var(--green);
  background: linear-gradient(135deg, var(--surface) 0%, var(--green-bg) 100%);
}
.result-card.cheapest::before {
  content: '⭐ CHEAPEST';
  position: absolute;
  top: 0;
  right: 0;
  background: var(--green);
  color: #0b0f14;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 0.15rem 0.55rem;
  border-bottom-left-radius: 8px;
}
.result-card.cheapest .price { color: var(--green); }

.station-info { min-width: 0; }
.station-name {
  font-weight: 600;
  font-size: 0.9rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.station-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.15rem 0.6rem;
  margin-top: 0.2rem;
}
.station-meta span {
  font-size: 0.73rem;
  color: var(--text-muted);
}
.brand-tag {
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  background: var(--surface-3);
  padding: 0.1rem 0.4rem;
  border-radius: 4px;
  color: var(--text-dim);
}
.price {
  font-family: var(--mono);
  font-size: 1.3rem;
  font-weight: 700;
  white-space: nowrap;
}
.price-unit {
  font-size: 0.62rem;
  font-weight: 400;
  color: var(--text-dim);
  margin-left: 1px;
}

/* Expanded card details */
.result-card .details {
  display: none;
  grid-column: 1 / -1;
  border-top: 1px solid var(--border);
  margin-top: 0.7rem;
  padding-top: 0.7rem;
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.6;
}
.result-card.expanded .details { display: block; animation: fadeIn 0.2s ease; }
.details strong { color: var(--text); font-weight: 600; }
.detail-actions {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.6rem;
  flex-wrap: wrap;
}
.detail-actions a {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--accent);
  text-decoration: none;
  padding: 0.4rem 0.7rem;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
}
.detail-actions a:active { background: var(--surface-3); }

/* ── Compare View ── */
.compare-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 0.6rem;
}
.compare-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.85rem;
  position: relative;
  transition: border-color 0.2s, transform 0.15s;
}
.compare-card:active { transform: scale(0.97); }
.compare-card.best {
  border-color: var(--green);
  background: linear-gradient(135deg, var(--surface), var(--green-bg));
}
.compare-card.best .compare-price { color: var(--green); }
.compare-card.unavailable { opacity: 0.5; }
.compare-fuel {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 0.35rem;
}
.compare-price {
  font-family: var(--mono);
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 0.15rem;
}
.compare-station {
  font-size: 0.72rem;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.compare-suburb {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 0.15rem;
}
.compare-loader {
  height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 0.5rem;
  position: relative;
}
.compare-loader::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: loaderSlide 1.4s infinite;
}
@keyframes loaderSlide {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ── History View / Chart ── */
.history-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.75rem;
  text-align: center;
}
.stat-label {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 0.25rem;
}
.stat-value {
  font-family: var(--mono);
  font-size: 1.05rem;
  font-weight: 700;
}
.stat-value.up { color: var(--red); }
.stat-value.down { color: var(--green); }
.stat-trend {
  font-size: 0.7rem;
  margin-top: 0.15rem;
}

.chart-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 1rem;
}
.chart-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.5rem;
}
.chart-title { font-size: 0.85rem; font-weight: 600; }
.chart-subtitle { font-size: 0.7rem; color: var(--text-dim); }
#priceChart { width: 100%; height: 200px; display: block; }

.history-empty {
  text-align: center;
  padding: 2.5rem 1rem;
  color: var(--text-muted);
}
.history-empty .icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.6; }
.history-empty h3 { color: var(--text); font-size: 0.95rem; margin-bottom: 0.3rem; }
.history-empty p { font-size: 0.8rem; max-width: 280px; margin: 0 auto; line-height: 1.5; }

.history-clear {
  margin: 1rem auto 0;
  display: block;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--red);
  padding: 0.5rem 1rem;
  border-radius: 100px;
  font-size: 0.8rem;
}

/* ── Bottom Tab Nav ── */
.tab-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(19,25,32,0.95);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  border-top: 1px solid var(--border);
  display: flex;
  height: calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  z-index: 60;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  color: var(--text-dim);
  font-size: 0.68rem;
  font-weight: 500;
  position: relative;
  transition: color 0.2s;
}
.tab-btn:active { background: rgba(255,255,255,0.04); }
.tab-btn.active { color: var(--accent); }
.tab-btn .tab-icon {
  font-size: 1.15rem;
  line-height: 1;
  transition: transform 0.2s;
}
.tab-btn.active .tab-icon { transform: translateY(-2px); }
.tab-indicator {
  position: absolute;
  top: 0;
  height: 2px;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
  width: calc(100% / 3);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── Empty States ── */
.state-message {
  text-align: center;
  padding: 2.5rem 1rem;
  color: var(--text-muted);
}
.state-message .icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.6; }
.state-message h3 { color: var(--text); font-size: 0.95rem; margin-bottom: 0.3rem; }
.state-message p { font-size: 0.8rem; max-width: 280px; margin: 0 auto; line-height: 1.5; }

/* ── Skeletons ── */
.skeleton {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { to { background-position: -200% 0; } }
.skel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.9rem 1rem;
  margin-bottom: 0.5rem;
  display: grid;
  grid-template-columns: 1fr 80px;
  gap: 0.75rem;
  align-items: center;
}
.skel-info { display: flex; flex-direction: column; gap: 0.4rem; }
.skel-name { width: 65%; height: 14px; }
.skel-addr { width: 45%; height: 11px; }
.skel-price { width: 70px; height: 26px; }

/* ── Pull-to-refresh ── */
.refresh-indicator {
  position: fixed;
  top: -50px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #fff;
  padding: 0.5rem 1rem;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
  transition: top 0.3s;
  z-index: 200;
  box-shadow: var(--shadow-lg);
}
.refresh-indicator.show { top: calc(var(--safe-top) + 12px); }

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 1.5rem 1rem;
  font-size: 0.7rem;
  color: var(--text-dim);
  line-height: 1.7;
}
.footer a { color: var(--accent); text-decoration: none; }

/* ── Responsive tweaks ── */
@media (min-width: 600px) {
  .header { padding: calc(var(--safe-top) + 1rem) 1.5rem 1rem; }
  .container { padding: 1.5rem; }
}
@media (max-width: 380px) {
  .price { font-size: 1.15rem; }
  .station-name { font-size: 0.85rem; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header" id="header">
  <div class="header-row">
    <div class="logo">
      <div class="logo-icon">⛽</div>
      <h1>WA <span>FuelWatch</span></h1>
    </div>
    <div class="search-input-wrap" id="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="suburb-input" placeholder="Search suburb..." autocomplete="off" spellcheck="false" inputmode="search">
      <button class="search-clear" id="search-clear" aria-label="Clear">✕</button>
      <div class="autocomplete-list" id="autocomplete"></div>
    </div>
  </div>
  <div class="filter-strip" id="fuel-types">
    <div class="fuel-pill selected" data-product="1">ULP 91</div>
    <div class="fuel-pill" data-product="2">PULP 95</div>
    <div class="fuel-pill" data-product="6">98 RON</div>
    <div class="fuel-pill" data-product="4">Diesel</div>
    <div class="fuel-pill" data-product="11">Brand Diesel</div>
    <div class="fuel-pill" data-product="5">LPG</div>
    <div class="fuel-pill" data-product="10">E85</div>
  </div>
</header>

<div class="refresh-indicator" id="refresh-ind">↻ Refreshing...</div>

<div class="container">
  <!-- Prices View -->
  <div class="view active" id="view-prices">
    <div class="options-bar">
      <select class="sort-select" id="sort-select">
        <option value="price">Sort: Cheapest first</option>
        <option value="price-desc">Sort: Most expensive</option>
        <option value="brand">Sort: Brand A–Z</option>
        <option value="name">Sort: Station A–Z</option>
      </select>
      <button class="toggle-chip on" id="surrounding-toggle">
        <span class="dot">●</span> Nearby suburbs
      </button>
    </div>
    <div id="results-container"></div>
  </div>

  <!-- Compare View -->
  <div class="view" id="view-compare">
    <div class="section-head">
      <h2>Compare All Fuels <span class="badge" id="compare-suburb-tag">—</span></h2>
      <span class="section-meta" id="compare-time">—</span>
    </div>
    <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:1rem;line-height:1.5;">
      The cheapest station for each fuel type at your selected location.
    </p>
    <div class="compare-grid" id="compare-grid"></div>
  </div>

  <!-- History View -->
  <div class="view" id="view-history">
    <div id="history-content"></div>
  </div>

  <div class="footer">
    Data from <a href="https://www.fuelwatch.wa.gov.au" target="_blank" rel="noopener">FuelWatch WA</a><br>
    Tomorrow's prices appear after 2:30 PM AWST · Install to home screen for app-like use
  </div>
</div>

<!-- Bottom Tab Nav -->

// ── State ──
let selectedProduct = 1;
let currentSuburb = 'Dalwallinu';

// ── Init ──

// ── Preferences ──
function loadPreferences() {
  try {
    const saved = JSON.parse(localStorage.getItem('fw_prefs_v2') || '{}');
    if (saved.suburb) currentSuburb = saved.suburb;
    if (saved.product && PRODUCTS[saved.product]) selectedProduct = saved.product;
    if (typeof saved.surrounding === 'boolean') surrounding = saved.surrounding;
    if (saved.sort) sortMode = saved.sort;
  } catch(e) {}
  document.getElementById('suburb-input').value = currentSuburb;
  document.getElementById('search-wrap').classList.toggle('has-value', !!currentSuburb);
  document.getElementById('sort-select').value = sortMode;
  document.getElementById('surrounding-toggle').classList.toggle('on', surrounding);
}

function savePreferences() {
  try {
    localStorage.setItem('fw_prefs_v2', JSON.stringify({
      suburb: currentSuburb,
      product: selectedProduct,
      surrounding,
      sort: sortMode
    }));
  } catch(e) {}
}

// ── Price History (localStorage) ──
function recordPriceHistory(suburb, product, stations) {
  if (!stations || !stations.length) return;
  try {
    const key = 'fw_history_v1';
    const history = JSON.parse(localStorage.getItem(key) || '{}');
    const histKey = `${suburb}__${product}`;
    if (!history[histKey]) history[histKey] = [];
    const today = new Date().toISOString().slice(0, 10);
    const cheapest = stations[0].price;
    const avg = stations.reduce((a, s) => a + s.price, 0) / stations.length;
    // Replace today's entry if exists
    history[histKey] = history[histKey].filter(e => e.date !== today);
    history[histKey].push({
      date: today,
      cheapest: Math.round(cheapest * 10) / 10,
      avg: Math.round(avg * 10) / 10,
      stations: stations.length,
      cheapestName: stations[0].name
    });
    // Keep last 30 days
    history[histKey] = history[histKey].slice(-30);
    localStorage.setItem(key, JSON.stringify(history));
  } catch(e) {}
}

function getPriceHistory(suburb, product) {
  try {
    const history = JSON.parse(localStorage.getItem('fw_history_v1') || '{}');
    return history[`${suburb}__${product}`] || [];
  } catch(e) { return []; }
}

function clearAllHistory() {
  if (!confirm('Clear all price history?')) return;
  localStorage.removeItem('fw_history_v1');
  renderHistoryView();
}

// ── Setup Functions ──
function setupFuelPills() {
  document.querySelectorAll('.fuel-pill').forEach(pill => {
    const prod = parseInt(pill.dataset.product);
    if (prod === selectedProduct) pill.classList.add('selected');
    else pill.classList.remove('selected');
    pill.addEventListener('click', () => {
      document.querySelectorAll('.fuel-pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      selectedProduct = prod;
      savePreferences();
      // Refresh whichever view is active
      if (activeView === 'prices') doSearch();
      else if (activeView === 'history') renderHistoryView();
    });
  });
}

function setupHeaderScroll() {
  const header = document.getElementById('header');
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 6);
  }, { passive: true });
}

function setupSurroundingToggle() {
  document.getElementById('surrounding-toggle').addEventListener('click', () => {
    surrounding = !surrounding;
    document.getElementById('surrounding-toggle').classList.toggle('on', surrounding);
    savePreferences();
    doSearch();

}

function setupSortSelect() {
  document.getElementById('sort-select').addEventListener('change', (e) => {
    sortMode = e.target.value;

    if (lastResults.today.length) renderPricesView();
  });
}

function setupSearchClear() {
  const wrap = document.getElementById('search-wrap');
  const input = document.getElementById('suburb-input');
  document.getElementById('search-clear').addEventListener('click', () => {
    input.value = '';
    wrap.classList.remove('has-value');
    input.focus();
  });
  input.addEventListener('input', () => {
    wrap.classList.toggle('has-value', !!input.value);
  });

// ── Tab Navigation ──
function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });
}

function switchView(view) {
  if (activeView === view) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  activeView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  updateTabIndicator();
  if (view === 'compare') renderCompareView();
  else if (view === 'history') renderHistoryView();
}

function setupTabIndicator() {
  updateTabIndicator();
  window.addEventListener('resize', updateTabIndicator);
}
function updateTabIndicator() {
  const order = ['prices', 'compare', 'history'];
  const idx = order.indexOf(activeView);
  const ind = document.getElementById('tab-indicator');
  ind.style.transform = `translateX(${idx * 100}%)`;
}

// ── Autocomplete ──
function setupAutocomplete() {
  const input = document.getElementById('suburb-input');
  const list = document.getElementById('autocomplete');
  let activeIdx = -1;

  input.addEventListener('input', () => {
    const val = input.value.trim().toLowerCase();
    list.innerHTML = '';
    activeIdx = -1;
    if (val.length < 1) { list.classList.remove('show'); return; }
    let matches = WA_LOCATIONS.filter(s => s.toLowerCase().startsWith(val)).slice(0, 12);
    if (!matches.length) {
      matches = WA_LOCATIONS.filter(s => s.toLowerCase().includes(val)).slice(0, 12);
    }
    if (!matches.length) { list.classList.remove('show'); return; }
    matches.forEach(m => {
      const div = document.createElement('div');
      div.textContent = m;
      div.addEventListener('mousedown', (e) => {
        e.preventDefault();
        input.value = m;
        currentSuburb = m;
        document.getElementById('search-wrap').classList.add('has-value');
        list.classList.remove('show');
        savePreferences();
        doSearch();
      });
      list.appendChild(div);
    });
    list.classList.add('show');
  });

  input.addEventListener('keydown', (e) => {
    const items = list.querySelectorAll('div');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      items.forEach((it, i) => it.classList.toggle('active', i === activeIdx));
      if (items[activeIdx]) items[activeIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, 0);
      items.forEach((it, i) => it.classList.toggle('active', i === activeIdx));
      if (items[activeIdx]) items[activeIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIdx >= 0 && items[activeIdx]) {
        input.value = items[activeIdx].textContent;
        currentSuburb = input.value;
      } else if (input.value.trim()) {
        currentSuburb = input.value.trim();
      }
      list.classList.remove('show');
      input.blur();
      savePreferences();
      doSearch();
    } else if (e.key === 'Escape') {
      list.classList.remove('show');
      input.blur();
    }
  });

  input.addEventListener('blur', () => {
    setTimeout(() => list.classList.remove('show'), 150);
  });
  input.addEventListener('focus', () => {
    if (input.value.trim().length > 0) input.dispatchEvent(new Event('input'));
  });
}

// ── Fetch ──
async function fetchFuelData(product, suburb, surrounding, day) {
  const surr = surrounding ? 'yes' : 'no';
  let url = `https://www.fuelwatch.wa.gov.au/fuelwatch/fuelWatchRSS?Product=${product}&Suburb=${encodeURIComponent(suburb)}&Surrounding=${surr}`;
  if (day === 'tomorrow') url += '&Day=tomorrow';

  for (let i = 0; i < CORS_PROXIES.length; i++) {
    try {
      const proxyUrl = CORS_PROXIES[i](url);
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 12000);
      const resp = await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(tid);
      if (!resp.ok) continue;
      const text = await resp.text();
      return parseRSS(text, day);
    } catch(e) {
      if (i === CORS_PROXIES.length - 1) throw e;
    }
  }
  throw new Error('All proxies failed');
}

function parseRSS(xml, day) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const items = doc.querySelectorAll('item');
  const stations = [];
  items.forEach(item => {
    const get = tag => {
      const el = item.querySelector(tag);
      return el ? el.textContent.trim() : '';
    };
    stations.push({
      name: get('trading-name'),
      brand: get('brand'),
      price: parseFloat(get('price')),
      address: get('address'),
      location: get('location'),
      phone: get('phone'),
      date: get('date'),
      lat: parseFloat(get('latitude')),
      lng: parseFloat(get('longitude')),
      features: get('site-features'),
      restrictions: get('restrictions'),
      day: day || 'today'
    });
  });
  stations.sort((a, b) => a.price - b.price);
  return stations;
}

function isAfter230AWST() {
  const awst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Australia/Perth' }));
  return awst.getHours() > 14 || (awst.getHours() === 14 && awst.getMinutes() >= 30);
}

function getAWSTTime() {
  return new Date().toLocaleString('en-AU', {
    timeZone: 'Australia/Perth',
    weekday: 'short', day: 'numeric', month: 'short',
    hour: '2-digit', minute: '2-digit', hour12: true
  });
}

function sortStations(arr, mode) {
  const out = [...arr];
  switch (mode) {
    case 'price-desc': out.sort((a, b) => b.price - a.price); break;
    case 'brand': out.sort((a, b) => (a.brand || '').localeCompare(b.brand || '')); break;
    case 'name': out.sort((a, b) => a.name.localeCompare(b.name)); break;
    default: out.sort((a, b) => a.price - b.price);
  }
  return out;
}

// ── Search & Render ──
async function doSearch() {
  const input = document.getElementById('suburb-input');
  const suburb = input.value.trim();
  if (!suburb) { input.focus(); return; }
  currentSuburb = suburb;
  savePreferences();

  const container = document.getElementById('results-container');
  container.innerHTML = renderSkeletons(5);

  const showTomorrow = isAfter230AWST();

  try {
    const [todayData, tomorrowData] = await Promise.all([
      fetchFuelData(selectedProduct, suburb, surrounding, 'today'),
      showTomorrow ? fetchFuelData(selectedProduct, suburb, surrounding, 'tomorrow') : Promise.resolve(null)
    ]);

    lastResults.today = todayData || [];
    lastResults.tomorrow = tomorrowData || [];

    // Record price history (today only, cheapest entry)
    recordPriceHistory(suburb, selectedProduct, todayData);

    renderPricesView();
  } catch(err) {
    console.error(err);
    container.innerHTML = `
      <div class="state-message">
        <div class="icon">⚠️</div>
        <h3>Couldn't fetch prices</h3>
        <p>FuelWatch may be temporarily unavailable, or the CORS proxy is down. Try again in a moment.</p>
        <button class="history-clear" style="color:var(--accent)" onclick="doSearch()">Retry</button>
      </div>`;
  }
}

function renderPricesView() {
  const container = document.getElementById('results-container');
  const productLabel = PRODUCTS[selectedProduct]?.name || 'Fuel';
  let html = '';

  // Today
  html += renderResultsSection(
    sortStations(lastResults.today, sortMode),
    `Today's ${productLabel}`,
    currentSuburb,
    'today',
    lastResults.today
  );

  // Tomorrow
  if (lastResults.tomorrow && lastResults.tomorrow.length) {
    html += renderResultsSection(
      sortStations(lastResults.tomorrow, sortMode),
      `Tomorrow's ${productLabel}`,
      currentSuburb,
      'tomorrow',
      lastResults.tomorrow
    );
  } else if (isAfter230AWST()) {
    html += `
      <div style="margin-top:1.5rem;">
        <div class="section-head">
          <h2><span class="tomorrow-tag">☀ Tomorrow</span> ${productLabel}</h2>
        </div>
        <div class="state-message" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;">
          <div class="icon">📭</div>
          <h3>No tomorrow prices yet</h3>
          <p>Tomorrow's prices may not be available for this location.</p>
        </div>
      </div>`;
  }

  container.innerHTML = html;
  attachCardHandlers();
}

function renderResultsSection(stations, title, suburb, dayType, originalUnsorted) {
  let html = `<div style="${dayType === 'tomorrow' ? 'margin-top:1.5rem;' : ''}">`;
  html += `<div class="section-head">`;
  html += `<h2>`;
  if (dayType === 'tomorrow') html += `<span class="tomorrow-tag">☀ Tomorrow</span> `;
  html += `${title} <span class="badge">${stations.length}</span></h2>`;
  html += `<span class="section-meta">${escHtml(suburb)} · ${getAWSTTime()}</span>`;
  html += `</div>`;

  if (!stations.length) {
    html += `
      <div class="state-message" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;">
        <div class="icon">🔍</div>
        <h3>No results found</h3>
        <p>No stations found here. Try toggling "Nearby suburbs" or pick a different fuel type.</p>
      </div>`;
  } else {
    // The cheapest is determined from the original list, not the sorted view
    const cheapestPrice = Math.min(...originalUnsorted.map(s => s.price));
    stations.forEach((s, i) => {
      const isCheap = s.price === cheapestPrice;
      const cardId = `card-${dayType}-${i}`;
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name + ' ' + s.address + ' ' + s.location + ' WA')}`;
      const phoneClean = (s.phone || '').replace(/[^\d+]/g, '');
      html += `
        <div class="result-card ${isCheap ? 'cheapest' : ''}" data-card="${cardId}">
          <div class="station-info">
            <div class="station-name">${escHtml(s.name)}</div>
            <div class="station-meta">
              <span class="brand-tag">${escHtml(s.brand)}</span>
              <span>📍 ${escHtml(s.location)}</span>
            </div>
          </div>
          <div class="price">${s.price.toFixed(1)}<span class="price-unit">¢/L</span></div>
          <div class="details">
            <div><strong>Address:</strong> ${escHtml(s.address)}, ${escHtml(s.location)}</div>
            ${s.phone ? `<div><strong>Phone:</strong> ${escHtml(s.phone)}</div>` : ''}
            ${s.features ? `<div style="margin-top:0.4rem;"><strong>Features:</strong> ${escHtml(s.features)}</div>` : ''}
            ${s.restrictions ? `<div style="margin-top:0.4rem;color:var(--amber);"><strong>⚠ Restrictions:</strong> ${escHtml(s.restrictions)}</div>` : ''}
            <div class="detail-actions">
              <a href="${mapsUrl}" target="_blank" rel="noopener">🗺️ Directions</a>
              ${phoneClean ? `<a href="tel:${phoneClean}">📞 Call</a>` : ''}
            </div>
          </div>
        </div>`;
    });
  }

  html += `</div>`;
  return html;
}

function attachCardHandlers() {
  document.querySelectorAll('.result-card').forEach(card => {
    card.addEventListener('click', (e) => {
      // Don't toggle if user clicked an internal link
      if (e.target.closest('a')) return;
      card.classList.toggle('expanded');
    });
  });
}

function renderSkeletons(count) {
  let html = '';
  for (let i = 0; i < count; i++) {
    html += `
      <div class="skel-card">
        <div class="skel-info">
          <div class="skeleton skel-name"></div>
          <div class="skeleton skel-addr"></div>
        </div>
        <div class="skeleton skel-price"></div>
      </div>`;
  }
  return html;
}

// ── Compare View ──
async function renderCompareView() {
  const grid = document.getElementById('compare-grid');
  document.getElementById('compare-suburb-tag').textContent = currentSuburb;
  document.getElementById('compare-time').textContent = getAWSTTime();

  // Render placeholder cards immediately
  grid.innerHTML = PRODUCT_ORDER.map(p => `
    <div class="compare-card" data-product="${p}">
      <div class="compare-fuel">${PRODUCTS[p].short}</div>
      <div class="compare-price" style="color:var(--text-dim);">—</div>
      <div class="compare-station">Loading...</div>
      <div class="compare-loader"></div>
    </div>
  `).join('');

  // Fetch all in parallel
  const results = await Promise.allSettled(
    PRODUCT_ORDER.map(p => fetchFuelData(p, currentSuburb, surrounding, 'today'))
  );

  // Find global cheapest (across all fuel types) for "best deal" highlight
  // Actually, compare per-fuel best vs others doesn't work — instead, mark each fuel's cheapest station
  // We'll mark the OVERALL lowest price card as "best"
  let globalMin = Infinity;
  const data = results.map((r, i) => {
    if (r.status === 'fulfilled' && r.value && r.value.length) {
      const cheapest = r.value[0];
      if (cheapest.price < globalMin) globalMin = cheapest.price;
      return { product: PRODUCT_ORDER[i], station: cheapest, count: r.value.length };
    }
    return { product: PRODUCT_ORDER[i], station: null, count: 0 };
  });

  grid.innerHTML = data.map(d => {
    if (!d.station) {
      return `
        <div class="compare-card unavailable">
          <div class="compare-fuel">${PRODUCTS[d.product].short}</div>
          <div class="compare-price" style="color:var(--text-dim);">—</div>
          <div class="compare-station">Not available</div>
        </div>`;
    }
    const isBest = d.station.price === globalMin;
    return `
      <div class="compare-card ${isBest ? 'best' : ''}">
        <div class="compare-fuel">${PRODUCTS[d.product].short}</div>
        <div class="compare-price">${d.station.price.toFixed(1)}<span class="price-unit" style="font-family:var(--font);font-size:0.7rem;color:var(--text-dim);"> ¢/L</span></div>
        <div class="compare-station" title="${escHtml(d.station.name)}">${escHtml(d.station.name)}</div>
        <div class="compare-suburb">${escHtml(d.station.location)} · ${d.count} sites</div>
      </div>`;
  }).join('');
}

// ── History View ──
function renderHistoryView() {
  const container = document.getElementById('history-content');
  const history = getPriceHistory(currentSuburb, selectedProduct);
  const productLabel = PRODUCTS[selectedProduct]?.name || 'Fuel';

  if (history.length < 2) {
    container.innerHTML = `
      <div class="section-head">
        <h2>${productLabel} History <span class="badge">${currentSuburb}</span></h2>
      </div>
      <div class="history-empty">
        <div class="icon">📈</div>
        <h3>Not enough data yet</h3>
        <p>Search prices a few times over different days to start building a price trend chart for ${escHtml(currentSuburb)}.</p>
        ${history.length === 1 ? `<p style="margin-top:0.5rem;font-size:0.75rem;">1 day recorded so far.</p>` : ''}
      </div>`;
    return;
  }

  // Calculate stats
  const cheapest = history.map(h => h.cheapest);
  const today = cheapest[cheapest.length - 1];
  const yesterday = cheapest[cheapest.length - 2];
  const min = Math.min(...cheapest);
  const max = Math.max(...cheapest);
  const avg = cheapest.reduce((a, b) => a + b, 0) / cheapest.length;
  const change = today - yesterday;
  const changeStr = change === 0 ? '—' : (change > 0 ? '+' : '') + change.toFixed(1);
  const changeClass = change > 0 ? 'up' : (change < 0 ? 'down' : '');
  const changeArrow = change > 0 ? '▲' : (change < 0 ? '▼' : '•');

  let html = `
    <div class="section-head">
      <h2>${productLabel} History <span class="badge">${escHtml(currentSuburb)}</span></h2>
      <span class="section-meta">${history.length} days tracked</span>
    </div>

    <div class="history-stats">
      <div class="stat-card">
        <div class="stat-label">Today</div>
        <div class="stat-value">${today.toFixed(1)}¢</div>
        <div class="stat-trend ${changeClass}" style="color:var(${change > 0 ? '--red' : change < 0 ? '--green' : '--text-dim'});">${changeArrow} ${changeStr}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg</div>
        <div class="stat-value">${avg.toFixed(1)}¢</div>
        <div class="stat-trend">${history.length}d</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Range</div>
        <div class="stat-value" style="font-size:0.85rem;">${min.toFixed(1)}–${max.toFixed(1)}</div>
        <div class="stat-trend">${(max - min).toFixed(1)}¢ spread</div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-head">
        <div>
          <div class="chart-title">Cheapest Price Trend</div>
          <div class="chart-subtitle">Tap or hover points for details</div>
        </div>
      </div>
      <svg id="priceChart" viewBox="0 0 600 200" preserveAspectRatio="none"></svg>
    </div>

    <button class="history-clear" onclick="clearAllHistory()">Clear all history</button>
  `;
  container.innerHTML = html;
  drawChart(history);
}

function drawChart(history) {
  const svg = document.getElementById('priceChart');
  if (!svg) return;
  const W = 600, H = 200;
  const padL = 40, padR = 15, padT = 20, padB = 30;
  const cw = W - padL - padR;
  const ch = H - padT - padB;

  const prices = history.map(h => h.cheapest);
  let minP = Math.min(...prices);
  let maxP = Math.max(...prices);
  if (minP === maxP) { minP -= 1; maxP += 1; }
  const range = maxP - minP;

  const xStep = history.length > 1 ? cw / (history.length - 1) : 0;
  const points = history.map((h, i) => ({
    x: padL + i * xStep,
    y: padT + ch - ((h.cheapest - minP) / range) * ch,
    data: h
  }));

  // Build SVG content
  let svgContent = '';

  // Y-axis grid lines + labels (4 lines)
  for (let i = 0; i <= 3; i++) {
    const y = padT + (ch / 3) * i;
    const val = maxP - (range / 3) * i;
    svgContent += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2,2"/>`;
    svgContent += `<text x="${padL - 4}" y="${y + 3}" text-anchor="end" font-size="9" fill="var(--text-dim)" font-family="var(--mono)">${val.toFixed(1)}</text>`;
  }

  // X-axis labels (first, middle, last)
  const xLabelIndices = history.length <= 3
    ? history.map((_, i) => i)
    : [0, Math.floor(history.length / 2), history.length - 1];
  xLabelIndices.forEach(i => {
    if (!points[i]) return;
    const d = new Date(history[i].date);
    const lbl = d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
    svgContent += `<text x="${points[i].x}" y="${H - padB + 15}" text-anchor="middle" font-size="9" fill="var(--text-dim)">${lbl}</text>`;
  });

  // Area fill under line
  let areaPath = `M ${points[0].x} ${padT + ch} L ${points[0].x} ${points[0].y}`;
  points.forEach((p, i) => { if (i > 0) areaPath += ` L ${p.x} ${p.y}`; });
  areaPath += ` L ${points[points.length-1].x} ${padT + ch} Z`;
  svgContent += `<defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity="0.35"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>`;
  svgContent += `<path d="${areaPath}" fill="url(#areaGrad)"/>`;

  // Line
  let linePath = `M ${points[0].x} ${points[0].y}`;
  points.forEach((p, i) => { if (i > 0) linePath += ` L ${p.x} ${p.y}`; });
  svgContent += `<path d="${linePath}" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;

  // Points + tooltip-on-hover
  points.forEach((p, i) => {
    const tooltipText = `${new Date(p.data.date).toLocaleDateString('en-AU',{day:'numeric',month:'short'})}: ${p.data.cheapest.toFixed(1)}¢`;
    svgContent += `
      <circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--accent)" stroke="var(--bg)" stroke-width="1.5">
        <title>${tooltipText}</title>
      </circle>`;
  });

  svg.innerHTML = svgContent;
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

// ── Pull-to-refresh (touch devices only) ──
if ('ontouchstart' in window && window.matchMedia('(pointer: coarse)').matches) {
  let touchStart = 0, pulling = false, activated = false;
  document.addEventListener('touchstart', (e) => {
    if (window.scrollY === 0 && activeView === 'prices') {
      touchStart = e.touches[0].clientY;
      pulling = true;
      activated = false;
    }
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - touchStart;
    if (dy > 80 && !activated) {
      activated = true;
      document.getElementById('refresh-ind').classList.add('show');
    }
  }, { passive: true });
  document.addEventListener('touchend', () => {
    const ind = document.getElementById('refresh-ind');
    if (activated) {
      doSearch().then(() => setTimeout(() => ind.classList.remove('show'), 600));
    }
    pulling = false;
    activated = false;
  });
}
</script>
